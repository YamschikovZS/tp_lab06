name: Build and Release Packages from homework

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure and build solver
        run: |
          cmake -S homework -B homework/_build -DCPACK_GENERATOR=DEB
          cmake --build homework/_build

      - name: Package with CPack (DEB)
        run: |
          cd homework/_build
          cpack -G DEB
          mkdir -p ../../artifacts
          mv *.deb ../../artifacts/

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: artifacts/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential rpm

      - name: Configure and build solver
        run: |
          cmake -S homework -B homework/_build -DCPACK_GENERATOR=RPM
          cmake --build homework/_build

      - name: Package with CPack (RPM)
        run: |
          cd homework/_build
          cpack -G RPM
          mkdir -p ../../artifacts
          mv *.rpm ../../artifacts/

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: artifacts/*.rpm

  build-dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure and build solver
        run: |
          cmake -S homework -B homework/_build -DCPACK_GENERATOR=DragNDrop
          cmake --build homework/_build

      - name: Package with CPack (DragNDrop)
        run: |
          cd homework/_build
          cpack -G DragNDrop
          mkdir -p ../../artifacts
          mv *.dmg ../../artifacts/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-package
          path: artifacts/*.dmg

  build-msi:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure and build solver
        run: |
          cmake -S homework -B homework/_build -DCPACK_GENERATOR=WIX
          cmake --build homework/_build --config Release

      - name: Package with CPack (WIX)
        run: |
          cd homework/_build
          cpack -G WIX -C Release
          mkdir -Force ../../artifacts
          move *.msi ../../artifacts/

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi-package
          path: artifacts/*.msi

  release:
    needs: [build-deb, build-rpm, build-dmg, build-msi]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/deb-package/*.deb
            artifacts/rpm-package/*.rpm
            artifacts/dmg-package/*.dmg
            artifacts/msi-package/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

